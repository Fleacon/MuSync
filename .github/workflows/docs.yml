# .github/workflows/docs.yml
name: Update API Docs
on:
  push:
    branches: [main]
jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Install swagger CLI
        run: dotnet tool install -g Swashbuckle.AspNetCore.Cli
      - name: Generate swagger.json
        run: |
          cd backend/backend
          dotnet swagger tofile --output ../../docs/api/swagger.json bin/Release/net8.0/backend.dll v1
      - name: Commit updated spec
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/swagger.json
          git diff --staged --quiet || git commit -m "Update swagger.json" && git push
